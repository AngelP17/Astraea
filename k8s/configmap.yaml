apiVersion: v1
kind: ConfigMap
metadata:
  name: astraea-api-config
  namespace: astraea
  labels:
    app.kubernetes.io/name: astraea
    app.kubernetes.io/component: config
data:
  LOG_LEVEL: "INFO"
  ENVIRONMENT: "production"
  REDIS_HOST: "astraea-redis.astraea.svc.cluster.local"
  REDIS_PORT: "6379"
  WORKER_CONCURRENCY: "4"
  PIPELINE_TIMEOUT_SECONDS: "300"
  MAX_QUEUE_SIZE: "10000"
  AUDIT_RETENTION_DAYS: "90"