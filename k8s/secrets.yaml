apiVersion: v1
kind: Secret
metadata:
  name: astraea-secrets
  namespace: astraea
  labels:
    app.kubernetes.io/name: astraea
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # Application secrets - replace with actual values in production
  SECRET_KEY: "change-me-in-production-use-k8s-secrets"
  # Database credentials (if using persistent DB)
  DB_HOST: "astraea-db.astraea.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "astraea"
  DB_USER: "astraea_user"
  DB_PASSWORD: "change-me-in-production"