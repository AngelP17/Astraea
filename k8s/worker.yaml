apiVersion: apps/v1
kind: Deployment
metadata:
  name: astraea-worker
  namespace: astraea
  labels:
    app.kubernetes.io/name: astraea
    app.kubernetes.io/component: worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: astraea-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: astraea-worker
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: worker
          image: astraea/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: api
          env:
            - name: ENVIRONMENT
              value: "production"
            - name: WORKER_TYPE
              value: "celery"
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: astraea-api-config
                  key: LOG_LEVEL
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: astraea-api-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: astraea-api-config
                  key: REDIS_PORT
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: astraea-secrets
                  key: SECRET_KEY
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - "import celery"
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - python
                - -c
                - "import celery"
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: artifacts-volume
              mountPath: /app/artifacts
      volumes:
        - name: artifacts-volume
          persistentVolumeClaim:
            claimName: astraea-artifacts-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: astraea-worker
  namespace: astraea
  labels:
    app.kubernetes.io/name: astraea
    app.kubernetes.io/component: worker
spec:
  clusterIP: None
  ports:
    - port: 5555
      targetPort: 5555
      name: flower
  selector:
    app.kubernetes.io/name: astraea-worker